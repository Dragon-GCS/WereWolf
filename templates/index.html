<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>狼人杀助手</title>
<style>
  :root {
    --bg: #141420;
    --surface: #1e1e2e;
    --surface2: #2a2a3e;
    --surface3: #353550;
    --accent: #e94560;
    --accent2: #f5a623;
    --green: #27ae60;
    --red: #e74c3c;
    --gray: #6c7080;
    --text: #e8eaf0;
    --text-dim: #8890a0;
    --wolf: #e05050;
    --good: #4a9eff;
    --radius: 12px;
    --r-sm: 8px;
    --shadow: 0 4px 20px rgba(0,0,0,.5);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    font-size: 15px;
  }

  /* ══ 顶栏 ══ */
  #topbar {
    background: var(--surface);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: var(--shadow);
    position: sticky;
    top: 0;
    z-index: 200;
    flex-shrink: 0;
  }
  #topbar-title { font-size: 15px; font-weight: 700; white-space: nowrap; }
  #player-badge {
    flex: 1;
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #player-badge strong { color: var(--accent2); }
  #conn-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--gray);
    flex-shrink: 0;
  }
  #conn-dot.on { background: var(--green); }

  /* ══ 当前阶段横幅 ══ */
  #phase-bar {
    background: linear-gradient(135deg, var(--surface2), var(--surface3));
    padding: 12px 14px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  #phase-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
  #phase-action { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.3; }
  #phase-action.night { color: #a0c4ff; }
  #phase-action.day   { color: var(--accent2); }
  #phase-action.vote  { color: var(--accent); }
  #phase-action.over  { color: #c084fc; }

  /* ══ 主内容滚动区 ══ */
  #main { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }

  /* ══ 加入面板 ══ */
  #join-panel { background: var(--surface); border-radius: var(--radius); padding: 20px 16px; }
  #join-panel h2 { font-size: 17px; margin-bottom: 16px; text-align: center; }
  .form-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .form-row label { width: 52px; font-size: 13px; color: var(--text-dim); flex-shrink: 0; }
  .form-row input, .form-row select {
    flex: 1; padding: 10px 12px;
    background: var(--surface2); border: 1px solid var(--surface3);
    border-radius: var(--r-sm); color: var(--text); font-size: 16px; outline: none;
  }
  .form-row input:focus { border-color: var(--accent); }

  /* ══ 通用按钮 ══ */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 11px 18px; border: none; border-radius: var(--r-sm);
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: opacity .15s, transform .1s; white-space: nowrap; user-select: none;
  }
  .btn:active { opacity: .75; transform: scale(.97); }
  .btn-primary { background: var(--accent);   color: #fff;  width: 100%; margin-top: 6px; }
  .btn-success { background: var(--green);    color: #fff; }
  .btn-warn    { background: var(--accent2);  color: #1a1a00; }
  .btn-danger  { background: var(--red);      color: #fff; }
  .btn-gray    { background: var(--surface3); color: var(--text); }
  .btn-sm  { padding: 7px 13px; font-size: 13px; border-radius: 6px; }
  .btn-full { width: 100%; }

  /* ══ 可折叠卡片 ══ */
  .card { background: var(--surface); border-radius: var(--radius); overflow: hidden; }
  .card-header {
    padding: 11px 14px; display: flex; align-items: center; justify-content: space-between;
    background: var(--surface2); cursor: pointer; user-select: none;
  }
  .card-header span { font-weight: 600; font-size: 14px; }
  .card-body { padding: 14px; display: none; }
  .card-body.open { display: block; }

  /* ══ 角色卡内容 ══ */
  .role-name { font-size: 26px; font-weight: 800; margin-bottom: 4px; }
  .role-team { font-size: 13px; margin-bottom: 12px; }
  .team-wolf { color: var(--wolf); }
  .team-good { color: var(--good); }
  .skill-item { background: var(--surface2); border-radius: 8px; padding: 9px 12px; margin-bottom: 6px; }
  .skill-item b { font-size: 14px; display: block; margin-bottom: 2px; }
  .skill-item span { font-size: 12px; color: var(--text-dim); }

  /* ══ 玩家网格 ══ */
  .section-title { font-size: 11px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 7px; }
  #player-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
  @media (max-width: 320px) { #player-grid { grid-template-columns: repeat(3, 1fr); } }
  .pc {
    background: var(--surface); border-radius: var(--r-sm); padding: 9px 4px 7px;
    text-align: center; position: relative; border: 2px solid transparent;
    transition: border-color .15s; cursor: pointer;
    min-height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .pc.speaking  { border-color: var(--accent2); background: #2a220a; }
  .pc.dead      { opacity: .4; }
  .pc.candidate { border-color: var(--accent); }
  .pc.sel       { border-color: var(--green); background: #0a2015; }
  .pc .sn { font-size: 20px; font-weight: 800; line-height: 1; }
  .pc .nk { font-size: 10px; color: var(--text-dim); margin-top: 3px; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pc .rl { font-size: 10px; color: var(--accent2); margin-top: 2px; }
  .badge-sh { position: absolute; top: 2px; right: 4px; font-size: 13px; }
  .dead-x { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--red); pointer-events: none; }

  /* ══ 动作面板 ══ */
  #action-panel { background: var(--surface); border-radius: var(--radius); padding: 14px; }
  #action-title { font-size: 12px; color: var(--accent2); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  #action-msg { font-size: 15px; margin-bottom: 12px; line-height: 1.5; font-weight: 600; }
  #seat-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 12px; }
  .seatbtn {
    padding: 14px 0; border: 2px solid var(--surface3); border-radius: 8px;
    background: var(--surface2); color: var(--text); font-size: 17px; font-weight: 700;
    cursor: pointer; text-align: center; transition: all .15s;
  }
  .seatbtn:disabled { opacity: .25; cursor: not-allowed; border-color: transparent; }
  .seatbtn.sel { background: var(--green); border-color: var(--green); color: #fff; }
  .seatbtn:not(:disabled):active { opacity: .7; }
  #action-confirm-row { display: flex; gap: 8px; }
  #speech-end-btn { display: none; }

  /* ══ 通知 ══ */
  #notif-panel { background: var(--surface); border-radius: var(--radius); padding: 12px; }
  #notif-panel h3 { font-size: 12px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  #notif-list { max-height: 140px; overflow-y: auto; }
  .notif-item { font-size: 13px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.05); color: var(--text-dim); }
  .notif-item:last-child { color: var(--text); border: none; }

  /* ══ 管理员面板 ══ */
  #admin-panel { background: var(--surface); border-radius: var(--radius); overflow: hidden; }
  #admin-header {
    padding: 11px 14px; display: flex; align-items: center; justify-content: space-between;
    background: rgba(233,69,96,.12); cursor: pointer; user-select: none;
  }
  #admin-header span { font-size: 14px; font-weight: 700; color: var(--accent); }
  #admin-body { display: none; padding: 14px; flex-direction: column; gap: 10px; }
  #admin-body.open { display: flex; }
  .admin-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .admin-row label { font-size: 12px; color: var(--text-dim); width: 52px; flex-shrink: 0; }
  .admin-row select, .admin-row input {
    flex: 1; min-width: 0; padding: 8px 10px;
    background: var(--surface2); border: 1px solid var(--surface3);
    border-radius: 6px; color: var(--text); font-size: 14px; outline: none;
  }
  .admin-row input[type=number] { max-width: 90px; flex: none; }
  .admin-divider { height: 1px; background: rgba(255,255,255,.08); }
  #event-log-list { max-height: 130px; overflow-y: auto; background: var(--bg); border-radius: 6px; padding: 6px 8px; font-size: 12px; }
  .eline { padding: 3px 4px; border-radius: 4px; cursor: pointer; color: var(--text-dim); }
  .eline:hover { background: var(--surface2); color: var(--text); }
  .eid { color: var(--accent2); margin-right: 4px; font-weight: 600; }

  /* ══ Toast ══ */
  #toast {
    position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%);
    background: rgba(10,10,20,.92); color: #fff; padding: 10px 20px; border-radius: 24px;
    font-size: 14px; display: none; z-index: 9999; max-width: 85vw; text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,.6); backdrop-filter: blur(8px);
  }

  /* ══ 游戏结束横幅 ══ */
  #over-banner {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.87); z-index: 9000;
    align-items: center; justify-content: center; flex-direction: column; gap: 14px;
  }
  #over-banner.show { display: flex; }
  #over-banner h1 { font-size: 32px; font-weight: 900; }
  #over-banner p  { font-size: 15px; color: var(--text-dim); }
</style>
</head>
<body>

<!-- 顶栏 -->
<div id="topbar">
  <div id="topbar-title">🐺 狼人杀</div>
  <div id="player-badge">未加入</div>
  <div id="conn-dot" title="连接状态"></div>
</div>

<!-- 阶段横幅 -->
<div id="phase-bar">
  <div id="phase-label">当前阶段</div>
  <div id="phase-action">等待开始</div>
</div>

<!-- 主内容 -->
<div id="main">

  <!-- 加入游戏 -->
  <div id="join-panel">
    <h2>加入游戏</h2>
    <div class="form-row">
      <label>座位号</label>
      <input type="number" id="seat-input" min="1" max="20" placeholder="1-20" inputmode="numeric">
    </div>
    <div class="form-row">
      <label>昵称</label>
      <input type="text" id="nick-input" maxlength="10" placeholder="你的昵称" autocomplete="off">
    </div>
    <button class="btn btn-primary" onclick="joinGame()">加入游戏</button>
  </div>

  <!-- 我的角色卡 -->
  <div id="role-card" class="card" style="display:none">
    <div class="card-header" onclick="toggleCard('role-body','role-arrow')">
      <span>我的角色</span><span id="role-arrow">▼</span>
    </div>
    <div class="card-body" id="role-body">
      <div class="role-name" id="role-name-el">-</div>
      <div class="role-team" id="role-team-el">-</div>
      <div id="skills-el"></div>
    </div>
  </div>

  <!-- 玩家列表 -->
  <div>
    <div class="section-title">玩家列表</div>
    <div id="player-grid"></div>
  </div>

  <!-- 动作面板 -->
  <div id="action-panel" style="display:none">
    <div id="action-title">操作</div>
    <div id="action-msg"></div>
    <div id="seat-buttons"></div>
    <div id="action-confirm-row">
      <button class="btn btn-success" id="confirm-btn"     onclick="confirmAction()" style="display:none;flex:1">✓ 确认</button>
      <button class="btn btn-gray"    id="skip-btn"         onclick="skipAction()"   style="display:none;flex:1">跳过</button>
      <button class="btn btn-warn btn-full" id="speech-end-btn" onclick="sendSpeechEnd()">✓ 发言结束</button>
    </div>
  </div>

  <!-- 通知日志 -->
  <div id="notif-panel">
    <h3>📢 公告</h3>
    <div id="notif-list"></div>
  </div>

  <!-- 管理员 -->
  <div id="admin-panel">
    <div id="admin-header" onclick="toggleCard('admin-body','admin-arrow')">
      <span>⚙️ 上帝操作</span><span id="admin-arrow">▼</span>
    </div>
    <div id="admin-body">
      <div class="admin-row">
        <label>预设局</label>
        <select id="preset-sel" style="flex:1"><option value="">选择预设...</option></select>
        <button class="btn btn-success btn-sm" onclick="adminStartPreset()">开始</button>
      </div>
      <div class="admin-row">
        <label>自定义</label>
        <input type="text" id="custom-roles" placeholder="werewolf,seer,witch,...">
        <button class="btn btn-success btn-sm" onclick="adminStartCustom()">开始</button>
      </div>
      <div class="admin-divider"></div>
      <div class="admin-row">
        <button class="btn btn-warn btn-sm" style="flex:1" onclick="adminSkip()">⏭ 跳过步骤</button>
        <button class="btn btn-danger btn-sm" style="flex:1" onclick="adminReset()">🔄 重置游戏</button>
      </div>
      <div class="admin-row">
        <label>座位</label>
        <input type="number" id="admin-seat" min="1" max="20" placeholder="号" inputmode="numeric" style="max-width:70px;flex:none">
        <button class="btn btn-danger btn-sm" onclick="adminKill()">击杀</button>
        <button class="btn btn-success btn-sm" onclick="adminRevive()">复活</button>
        <button class="btn btn-warn btn-sm" onclick="adminSheriff()">警长</button>
      </div>
      <div class="admin-row">
        <label>音频</label>
        <input type="number" id="audio-seat" min="0" max="20" placeholder="0=广播" inputmode="numeric" style="max-width:90px;flex:none">
        <button class="btn btn-gray btn-sm" onclick="adminAudio()">设置</button>
      </div>
      <div class="admin-divider"></div>
      <div class="section-title">事件日志（点击可回退到该节点）</div>
      <div id="event-log-list">-</div>
    </div>
  </div>

  <div style="height:20px;flex-shrink:0"></div>
</div>

<!-- 游戏结束 -->
<div id="over-banner">
  <h1 id="over-text">-</h1>
  <p>游戏结束！</p>
  <button class="btn btn-gray" onclick="document.getElementById('over-banner').classList.remove('show')">关闭</button>
</div>

<div id="toast"></div>
<audio id="audio-el" preload="none"></audio>

<script>
const WS_URL = `ws://${location.host}/ws`;
let ws = null, sessionId = null, mySeat = null, myNick = null;
let gameState = {}, myInfo = {};
let pendingTarget = null, pendingMode = null;
let reconnectTimer = null;

// ── WebSocket ──
function connect() {
  clearTimeout(reconnectTimer);
  ws = new WebSocket(WS_URL);
  ws.onopen    = () => setConn(true);
  ws.onclose   = () => { setConn(false); reconnectTimer = setTimeout(connect, 3000); };
  ws.onerror   = () => ws.close();
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
}
function send(type, data = {}) {
  if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type, data }));
}
function setConn(ok) { document.getElementById('conn-dot').className = ok ? 'on' : ''; }

// ── 消息处理 ──
function handleMsg(msg) {
  switch (msg.type) {
    case 'connected':   break;  // 无需 session_id
    case 'game_state':  gameState = msg.data; renderState(); break;
    case 'your_info':   myInfo = msg.data; renderMyInfo(); break;
    case 'action_request': showActionPanel(msg.data); break;
    case 'vote_request':   showVotePanel(msg.data); break;
    case 'speech_turn':    showSpeechPanel(msg.data); break;
    case 'action_clear':   hideActionPanel(); break;
    case 'action_result':  toast(msg.data.message, msg.data.success ? 3000 : 4500); break;
    case 'notification':   addNotif(msg.data.message); break;
    case 'play_audio':     playAudio(msg.data.file); break;
    case 'join_result':
      if (msg.data.success) {
        toast('✅ ' + msg.data.message);
        document.getElementById('join-panel').style.display = 'none';
        document.getElementById('role-card').style.display = 'block';
        updateBadge();
      } else {
        toast('❌ ' + msg.data.message, 4500);
      }
      break;
    case 'admin_result':
      toast('⚙️ ' + msg.data.message);
      loadEventLog();
      break;
    case 'error': toast('⚠️ ' + msg.data.message, 4500); break;
  }
}

// ── 加入 ──
function joinGame() {
  const seat = parseInt(document.getElementById('seat-input').value);
  const nick = document.getElementById('nick-input').value.trim();
  if (!seat || !nick) { toast('请填写座位号和昵称'); return; }
  mySeat = seat; myNick = nick;
  send('join', { seat, nickname: nick });
}
function updateBadge() {
  if (mySeat && myNick)
    document.getElementById('player-badge').innerHTML = `<strong>${mySeat}号</strong> · ${myNick}`;
}

// ── 渲染状态 ──
function renderState() {
  const { phase, phase_display, current_action, round, winner, players, current_speaker_seat, voting_candidates } = gameState;

  // 阶段横幅
  const ph = document.getElementById('phase-action');
  ph.textContent = current_action || phase_display || '等待开始';
  ph.className = '';
  if (phase === 'night' || phase === 'dawn') ph.classList.add('night');
  else if (phase === 'day_discuss') ph.classList.add('day');
  else if (phase === 'day_vote')    ph.classList.add('vote');
  else if (phase === 'game_over')   ph.classList.add('over');

  document.getElementById('phase-label').textContent =
    round > 0 ? `第 ${round} 轮 · ${phase_display || ''}` : '当前阶段';

  // 玩家网格
  const grid = document.getElementById('player-grid');
  grid.innerHTML = '';
  (players || []).forEach(p => {
    const div = document.createElement('div');
    let cls = 'pc';
    if (!p.is_alive) cls += ' dead';
    if (current_speaker_seat === p.seat) cls += ' speaking';
    if ((voting_candidates || []).includes(p.seat)) cls += ' candidate';
    if (pendingTarget === p.seat) cls += ' sel';
    div.className = cls;
    div.dataset.seat = p.seat;
    div.innerHTML =
      `<div class="sn">${p.seat}</div>` +
      `<div class="nk">${p.nickname || '?'}</div>` +
      (p.role_display ? `<div class="rl">${p.role_display}</div>` : '') +
      (p.is_sheriff   ? '<div class="badge-sh">⭐</div>' : '') +
      (!p.is_alive    ? '<div class="dead-x">✕</div>' : '');
    div.addEventListener('click', () => {
      if (pendingMode) selectTarget(p.seat);
      else document.getElementById('admin-seat').value = p.seat;
    });
    grid.appendChild(div);
  });

  if (winner) {
    document.getElementById('over-text').textContent =
      winner === 'werewolf' ? '🐺 狼人阵营胜利！' : '🌟 好人阵营胜利！';
    document.getElementById('over-banner').classList.add('show');
  }
}

function renderMyInfo() {
  if (!myInfo.role) return;
  const r = myInfo.role;
  document.getElementById('role-name-el').textContent = r.display_name;
  const teamEl = document.getElementById('role-team-el');
  teamEl.textContent = r.team === 'werewolf' ? '⚔️ 狼人阵营' : '🏡 好人阵营';
  teamEl.className = 'role-team ' + (r.team === 'werewolf' ? 'team-wolf' : 'team-good');
  document.getElementById('skills-el').innerHTML = (r.skills || [])
    .map(s => `<div class="skill-item"><b>${s.display_name}</b><span>${s.description}</span></div>`)
    .join('');
  // 首次收到角色信息时自动展开
  const body = document.getElementById('role-body');
  if (!body.classList.contains('open')) {
    body.classList.add('open');
    document.getElementById('role-arrow').textContent = '▲';
  }
}

// ── 动作面板 ──
function showActionPanel(data) {
  pendingMode = 'action'; pendingTarget = null;
  document.getElementById('action-panel').style.display = 'block';
  document.getElementById('action-title').textContent = data.skill_display || '技能使用';
  document.getElementById('action-msg').textContent   = data.message || '请选择目标';
  const c = document.getElementById('seat-buttons');
  c.innerHTML = '';
  if (data.requires_target) {
    (gameState.players || []).forEach(p => {
      const b = document.createElement('button');
      b.className = 'seatbtn';
      b.textContent = p.seat;
      b.dataset.seat = p.seat;
      b.disabled = !(data.valid_targets || []).includes(p.seat) || !p.is_alive;
      b.title = p.nickname || '';
      b.onclick = () => selectTarget(p.seat);
      c.appendChild(b);
    });
  }
  document.getElementById('confirm-btn').style.display    = data.requires_target ? 'flex' : 'none';
  document.getElementById('skip-btn').style.display       = data.can_skip ? 'flex' : 'none';
  document.getElementById('speech-end-btn').style.display = 'none';
}

function showVotePanel(data) {
  pendingMode = 'vote'; pendingTarget = null;
  document.getElementById('action-panel').style.display = 'block';
  document.getElementById('action-title').textContent = '投票';
  document.getElementById('action-msg').textContent   = data.message || '请选择淘汰玩家';
  const c = document.getElementById('seat-buttons');
  c.innerHTML = '';
  const ab = document.createElement('button');
  ab.className = 'seatbtn'; ab.textContent = '弃'; ab.title = '弃票';
  ab.onclick = () => selectTarget(0);
  c.appendChild(ab);
  (gameState.players || []).forEach(p => {
    const b = document.createElement('button');
    b.className = 'seatbtn'; b.textContent = p.seat; b.dataset.seat = p.seat;
    b.disabled = !(data.candidates || []).includes(p.seat);
    b.onclick = () => selectTarget(p.seat);
    c.appendChild(b);
  });
  document.getElementById('confirm-btn').style.display    = 'flex';
  document.getElementById('skip-btn').style.display       = 'none';
  document.getElementById('speech-end-btn').style.display = 'none';
}

function showSpeechPanel(data) {
  pendingMode = 'speech';
  document.getElementById('action-panel').style.display = 'block';
  document.getElementById('action-title').textContent = '🎤 你的发言';
  document.getElementById('action-msg').textContent   = data.message || '请发言';
  document.getElementById('seat-buttons').innerHTML   = '';
  document.getElementById('confirm-btn').style.display    = 'none';
  document.getElementById('skip-btn').style.display       = 'none';
  document.getElementById('speech-end-btn').style.display = 'flex';
}

function hideActionPanel() {
  pendingMode = null; pendingTarget = null;
  document.getElementById('action-panel').style.display = 'none';
  renderState();
}

function selectTarget(seat) {
  pendingTarget = (pendingTarget === seat) ? null : seat;
  document.querySelectorAll('.seatbtn').forEach(b => b.classList.toggle('sel', parseInt(b.dataset.seat) === pendingTarget));
  document.querySelectorAll('.pc').forEach(c => c.classList.toggle('sel', parseInt(c.dataset.seat) === pendingTarget));
}

function confirmAction() {
  if (pendingMode === 'action') send('action', { target: pendingTarget });
  else if (pendingMode === 'vote') send('vote', { target: pendingTarget ?? 0 });
  hideActionPanel();
}
function skipAction()    { send('action', { target: null }); hideActionPanel(); }
function sendSpeechEnd() { send('speech_end', {}); hideActionPanel(); }

// ── 通知 ──
function addNotif(msg) {
  const list = document.getElementById('notif-list');
  const el = document.createElement('div');
  el.className = 'notif-item'; el.textContent = msg;
  list.appendChild(el);
  list.scrollTop = list.scrollHeight;
  while (list.children.length > 40) list.removeChild(list.firstChild);
}

// ── 音频 ──
function playAudio(file) {
  const a = document.getElementById('audio-el');
  a.src = `/static/audio/${file}`; a.play().catch(() => {});
}

// ── Toast ──
let _tt = null;
function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(_tt); _tt = setTimeout(() => el.style.display = 'none', ms);
}

// ── 折叠 ──
function toggleCard(bid, aid) {
  const b = document.getElementById(bid), a = document.getElementById(aid);
  b.classList.toggle('open');
  a.textContent = b.classList.contains('open') ? '▲' : '▼';
  if (bid === 'admin-body' && b.classList.contains('open')) { loadPresets(); loadEventLog(); }
}

// ── 管理员 ──
function adminSend(cmd, extra = {}) { send('admin', { command: cmd, ...extra }); }
function adminStartPreset()  { const p = document.getElementById('preset-sel').value; if (!p) { toast('请选择预设'); return; } adminSend('start_game', { preset: p }); }
function adminStartCustom()  { const v = document.getElementById('custom-roles').value.trim(); if (!v) { toast('请输入角色列表'); return; } adminSend('start_game', { roles: v.split(',').map(r=>r.trim()).filter(Boolean) }); }
function adminSkip()         { adminSend('skip_phase'); }
function adminReset()        { if (confirm('确认重置游戏？')) adminSend('reset_game'); }
function adminKill()         { const s = +document.getElementById('admin-seat').value; if(s) adminSend('force_kill',{seat:s}); }
function adminRevive()       { const s = +document.getElementById('admin-seat').value; if(s) adminSend('force_revive',{seat:s}); }
function adminSheriff()      { const s = +document.getElementById('admin-seat').value; if(s) adminSend('set_sheriff',{seat:s}); }
function adminAudio()        { const s = parseInt(document.getElementById('audio-seat').value)||null; adminSend('set_audio_device',{seat:s}); }
function adminRollback(id)   { if (!confirm(`回退到事件 #${id}？`)) return; adminSend('rollback',{event_id:id}); }

async function loadPresets() {
  try {
    const cfg = await fetch('/api/config').then(r => r.json());
    const sel = document.getElementById('preset-sel');
    sel.innerHTML = '<option value="">选择预设...</option>';
    (cfg.presets || []).forEach(p => {
      const o = document.createElement('option');
      o.value = p.name;
      o.textContent = `${p.name}`;
      if (p.name === cfg.default) o.selected = true;
      sel.appendChild(o);
    });
  } catch(e) {}
}

async function loadEventLog() {
  try {
    const data = await fetch('/api/events').then(r => r.json());
    const evs  = (data.events || []).slice(-50).reverse();
    const el   = document.getElementById('event-log-list');
    if (!evs.length) { el.textContent = '暂无事件'; return; }
    el.innerHTML = evs.map(e =>
      `<div class="eline" onclick="adminRollback(${e.id-1})"><span class="eid">#${e.id}</span>[${e.timestamp}] ${e.description}</div>`
    ).join('');
  } catch(e) {}
}

connect();
</script>
</body>
</html>
