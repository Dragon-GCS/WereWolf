<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>狼人杀助手</title>
  <style>
    :root {
      --bg: #141420;
      --surface: #1e1e2e;
      --surface2: #2a2a3e;
      --surface3: #353550;
      --accent: #e94560;
      --accent2: #f5a623;
      --green: #27ae60;
      --red: #e74c3c;
      --gray: #6c7080;
      --text: #e8eaf0;
      --text-dim: #8890a0;
      --wolf: #e05050;
      --good: #4a9eff;
      --radius: 12px;
      --r-sm: 8px;
      --shadow: 0 4px 20px rgba(0, 0, 0, .5);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      font-size: 15px;
    }

    /* ══ 顶栏 ══ */
    #topbar {
      background: var(--surface);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 200;
      flex-shrink: 0;
    }

    #topbar-title {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
    }

    #player-badge {
      flex: 1;
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #player-badge strong {
      color: var(--accent2);
    }

    #conn-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--gray);
      flex-shrink: 0;
    }

    #conn-dot.on {
      background: var(--green);
    }

    /* ══ 当前阶段横幅 ══ */
    #phase-bar {
      background: linear-gradient(135deg, var(--surface2), var(--surface3));
      padding: 12px 14px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
    }

    #phase-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 3px;
    }

    #phase-action {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    #phase-action.night {
      color: #a0c4ff;
    }

    #phase-action.day {
      color: var(--accent2);
    }

    #phase-action.vote {
      color: var(--accent);
    }

    #phase-action.over {
      color: #c084fc;
    }

    /* ══ 主内容滚动区 ══ */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ══ 加入面板 ══ */
    #join-panel {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px 16px;
    }

    #join-panel h2 {
      font-size: 17px;
      margin-bottom: 16px;
      text-align: center;
    }

    .form-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .form-row label {
      width: 52px;
      font-size: 13px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .form-row input,
    .form-row select {
      flex: 1;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--surface3);
      border-radius: var(--r-sm);
      color: var(--text);
      font-size: 16px;
      outline: none;
    }

    .form-row input:focus {
      border-color: var(--accent);
    }

    /* ══ 通用按钮 ══ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 18px;
      border: none;
      border-radius: var(--r-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
      user-select: none;
    }

    .btn:active {
      opacity: .75;
      transform: scale(.97);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
      margin-top: 6px;
    }

    .btn-success {
      background: var(--green);
      color: #fff;
    }

    .btn-warn {
      background: var(--accent2);
      color: #1a1a00;
    }

    .btn-danger {
      background: var(--red);
      color: #fff;
    }

    .btn-gray {
      background: var(--surface3);
      color: var(--text);
    }

    .btn-sm {
      padding: 7px 13px;
      font-size: 13px;
      border-radius: 6px;
    }

    .btn-full {
      width: 100%;
    }

    /* ══ 可折叠卡片 ══ */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-header {
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      cursor: pointer;
      user-select: none;
    }

    .card-header span {
      font-weight: 600;
      font-size: 14px;
    }

    .card-body {
      padding: 14px;
      display: none;
    }

    .card-body.open {
      display: block;
    }

    /* ══ 角色卡内容 ══ */
    .role-name {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .role-team {
      font-size: 13px;
      margin-bottom: 12px;
    }

    .team-wolf {
      color: var(--wolf);
    }

    .team-good {
      color: var(--good);
    }

    .skill-item {
      background: var(--surface2);
      border-radius: 8px;
      padding: 9px 12px;
      margin-bottom: 6px;
    }

    .skill-item b {
      font-size: 14px;
      display: block;
      margin-bottom: 2px;
    }

    .skill-item span {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ══ 玩家网格 ══ */
    .section-title {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 7px;
    }

    #player-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }

    @media (max-width: 320px) {
      #player-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .pc {
      background: var(--surface);
      border-radius: var(--r-sm);
      padding: 9px 4px 7px;
      text-align: center;
      position: relative;
      border: 2px solid transparent;
      transition: border-color .15s;
      cursor: pointer;
      min-height: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .pc.speaking {
      border-color: var(--accent2);
      background: #2a220a;
    }

    .pc.dead {
      opacity: .4;
    }

    .pc.candidate {
      border-color: var(--accent);
    }

    .pc.sel {
      border-color: var(--green);
      background: #0a2015;
    }

    .pc .sn {
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
    }

    .pc .nk {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 3px;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pc .rl {
      font-size: 10px;
      color: var(--accent2);
      margin-top: 2px;
    }

    .badge-sh {
      position: absolute;
      top: 2px;
      right: 4px;
      font-size: 13px;
    }

    .dead-x {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--red);
      pointer-events: none;
    }

    .badge-seer {
      position: absolute;
      bottom: 2px;
      left: 3px;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 3px;
      border-radius: 3px;
      line-height: 1.3;
    }

    .badge-seer.wolf {
      background: var(--wolf);
      color: #fff;
    }

    .badge-seer.good {
      background: var(--good);
      color: #fff;
    }

    /* ══ 女巫面板 ══ */
    .witch-btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .witch-choice {
      flex: 1;
      padding: 12px 8px;
      border-radius: 8px;
      border: 2px solid var(--surface3);
      background: var(--surface2);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all .15s;
    }

    .witch-choice.sel-save {
      border-color: var(--green);
      background: #0a2015;
    }

    .witch-choice.sel-poison {
      border-color: var(--red);
      background: #200a0a;
    }

    .seatbtn.sel-poison {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .witch-choice:disabled {
      opacity: .3;
      cursor: not-allowed;
    }

    /* ══ 动作面板 ══ */
    #action-panel {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
    }

    #action-title {
      font-size: 12px;
      color: var(--accent2);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }

    #action-msg {
      font-size: 15px;
      margin-bottom: 12px;
      line-height: 1.5;
      font-weight: 600;
    }

    #seat-buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }

    .seatbtn {
      padding: 14px 0;
      border: 2px solid var(--surface3);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text);
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all .15s;
    }

    .seatbtn:disabled {
      opacity: .25;
      cursor: not-allowed;
      border-color: transparent;
    }

    .seatbtn.sel {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .seatbtn:not(:disabled):active {
      opacity: .7;
    }

    #action-confirm-row {
      display: flex;
      gap: 8px;
    }

    /* ══ 通知 ══ */
    #notif-panel {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px;
    }

    #notif-panel h3 {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }

    #notif-list {
      max-height: 140px;
      overflow-y: auto;
    }

    .notif-item {
      font-size: 13px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      color: var(--text-dim);
    }

    .notif-item:last-child {
      color: var(--text);
      border: none;
    }

    /* ══ 管理员面板 ══ */
    #admin-panel {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
    }

    #admin-header {
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(233, 69, 96, .12);
      cursor: pointer;
      user-select: none;
    }

    #admin-header span {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
    }

    #admin-body {
      display: none;
      padding: 14px;
      flex-direction: column;
      gap: 10px;
    }

    #admin-body.open {
      display: flex;
    }

    .admin-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .admin-row label {
      font-size: 12px;
      color: var(--text-dim);
      width: 52px;
      flex-shrink: 0;
    }

    .admin-row select,
    .admin-row input {
      flex: 1;
      min-width: 0;
      padding: 8px 10px;
      background: var(--surface2);
      border: 1px solid var(--surface3);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .admin-row input[type=number] {
      max-width: 90px;
      flex: none;
    }

    .admin-divider {
      height: 1px;
      background: rgba(255, 255, 255, .08);
    }

    #event-log-list {
      max-height: 130px;
      overflow-y: auto;
      background: var(--bg);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
    }

    .eline {
      padding: 3px 4px;
      border-radius: 4px;
      cursor: pointer;
      color: var(--text-dim);
    }

    .eline:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .eid {
      color: var(--accent2);
      margin-right: 4px;
      font-weight: 600;
    }

    /* ══ Toast ══ */
    #toast {
      position: fixed;
      bottom: calc(20px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 20, .92);
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px;
      display: none;
      z-index: 9999;
      max-width: 85vw;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .6);
      backdrop-filter: blur(8px);
    }

    /* ══ 游戏结束横幅 ══ */
    #over-banner {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .87);
      z-index: 9000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
    }

    #over-banner.show {
      display: flex;
    }

    #over-banner h1 {
      font-size: 32px;
      font-weight: 900;
    }

    #over-banner p {
      font-size: 15px;
      color: var(--text-dim);
    }
  </style>
</head>

<body>

  <!-- 顶栏 -->
  <div id="topbar">
    <div id="topbar-title">🐺 狼人杀</div>
    <div id="player-badge">未加入</div>
    <div id="conn-dot" title="连接状态"></div>
  </div>

  <!-- 阶段横幅 -->
  <div id="phase-bar">
    <div id="phase-label">当前阶段</div>
    <div id="phase-action">等待开始</div>
  </div>

  <!-- 主内容 -->
  <div id="main">

    <!-- 加入游戏 -->
    <div id="join-panel">
      <h2>加入游戏</h2>
      <div class="form-row">
        <label>座位号</label>
        <input type="number" id="seat-input" min="1" max="20" placeholder="1-20" inputmode="numeric">
      </div>
      <div class="form-row">
        <label>昵称</label>
        <input type="text" id="nick-input" maxlength="10" placeholder="你的昵称" autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="joinGame()">加入游戏</button>
    </div>

    <!-- 我的角色卡 -->
    <div id="role-card" class="card" style="display:none">
      <div class="card-header" onclick="toggleCard('role-body','role-arrow')">
        <span>我的角色</span><span id="role-arrow">▼</span>
      </div>
      <div class="card-body" id="role-body">
        <div class="role-name" id="role-name-el">-</div>
        <div class="role-team" id="role-team-el">-</div>
        <div id="skills-el"></div>
      </div>
    </div>

    <!-- 玩家列表 -->
    <div>
      <div class="section-title">玩家列表</div>
      <div id="player-grid"></div>
    </div>

    <!-- 动作面板 -->
    <div id="action-panel" style="display:none">
      <div id="action-title">操作</div>
      <div id="action-msg"></div>
      <div id="seat-buttons"></div>
      <div id="action-confirm-row">
        <button class="btn btn-success" id="confirm-btn" onclick="confirmAction()" style="display:none;flex:1">✓
          确认</button>
        <button class="btn btn-gray" id="skip-btn" onclick="skipAction()" style="display:none;flex:1">跳过</button>
        <button class="btn btn-warn btn-full" id="speech-end-btn" onclick="sendSpeechEnd()" style="display:none">✓
          发言结束</button>
      </div>
    </div>

    <!-- 通知日志 -->
    <div id="notif-panel">
      <h3>📢 公告</h3>
      <div id="notif-list"></div>
    </div>

    <!-- 管理员 -->
    <div id="admin-panel">
      <div id="admin-header" onclick="toggleCard('admin-body','admin-arrow')">
        <span>⚙️ 上帝操作</span><span id="admin-arrow">▼</span>
      </div>
      <div id="admin-body">
        <div class="admin-row">
          <label>预设局</label>
          <select id="preset-sel" style="flex:1">
            <option value="">选择预设...</option>
          </select>
          <button class="btn btn-success btn-sm" onclick="adminStartPreset()">开始</button>
        </div>
        <div class="admin-row">
          <label>自定义</label>
          <input type="text" id="custom-roles" placeholder="werewolf,seer,witch,...">
          <button class="btn btn-success btn-sm" onclick="adminStartCustom()">开始</button>
        </div>
        <div class="admin-divider"></div>
        <div class="admin-row">
          <button class="btn btn-warn btn-sm" style="flex:1" onclick="adminSkip()">⏭ 跳过步骤</button>
          <button class="btn btn-warn btn-sm" style="flex:1" onclick="adminGotoNight()">🌙 强制入夜</button>
          <button class="btn btn-danger btn-sm" style="flex:1" onclick="adminReset()">🔄 重置游戏</button>
        </div>
        <div class="admin-row">
          <label>座位</label>
          <input type="number" id="admin-seat" min="1" max="20" placeholder="号" inputmode="numeric"
            style="max-width:70px;flex:none">
          <button class="btn btn-danger btn-sm" onclick="adminKill()">击杀</button>
          <button class="btn btn-success btn-sm" onclick="adminRevive()">复活</button>
          <button class="btn btn-warn btn-sm" onclick="adminSheriff()">警长</button>
        </div>
        <div class="admin-row">
          <label>音频</label>
          <input type="number" id="audio-seat" min="0" max="20" placeholder="0=广播" inputmode="numeric"
            style="max-width:90px;flex:none">
          <button class="btn btn-gray btn-sm" onclick="adminAudio()">设置</button>
          <span id="audio-device-label" style="font-size:12px;color:var(--text-dim)">广播模式</span>
        </div>
        <div class="admin-divider"></div>
        <div class="section-title">事件日志（点击可回退到该节点）</div>
        <div id="event-log-list">-</div>
      </div>
    </div>

    <div style="height:20px;flex-shrink:0"></div>
  </div>

  <!-- 游戏结束 -->
  <div id="over-banner">
    <h1 id="over-text">-</h1>
    <p>游戏结束！</p>
    <button class="btn btn-gray" onclick="document.getElementById('over-banner').classList.remove('show')">关闭</button>
  </div>

  <div id="toast"></div>
  <audio id="audio-el" preload="none"></audio>

  <script>
    const WS_URL = `ws://${location.host}/ws`;
    let ws = null;
    let mySeat = null, myNick = null;
    let gameState = {}, myInfo = {};
    let pendingTarget = null, pendingMode = null;
    let seerResults = {};       // {seat: "camp"} for seer badge overlay
    let witchPendingData = null; // current witch_request data

    // ── 音频队列 ──
    let audioQueue = [];
    let audioPlaying = false;
    // 消息队列：play_audio 消息会阻塞后续消息，直到音频播完
    let msgQueue = [];
    let msgBlocked = false;

    let audioUnlocked = false;

    function unlockAudio() {
      if (audioUnlocked) return;
      const a = document.getElementById('audio-el');
      a.src = '/static/audio/请闭眼.mp3';
      a.volume = 0;
      a.play().then(() => { a.pause(); a.volume = 1; audioUnlocked = true; }).catch(() => { });
    }

    document.addEventListener('click', unlockAudio, { once: true });
    document.addEventListener('touchstart', unlockAudio, { once: true });

    function enqueueAudio(files) {
      if (!Array.isArray(files)) files = [files];
      audioQueue.push(...files);
      if (!audioPlaying) playNextAudio();
    }

    function playNextAudio() {
      if (audioQueue.length === 0) {
        audioPlaying = false;
        // 音频播完，解除消息阻塞，并通知服务端
        msgBlocked = false;
        drainMsgQueue();
        send('audio_done', {});
        return;
      }
      audioPlaying = true;
      const file = audioQueue.shift();
      const a = document.getElementById('audio-el');
      a.volume = 1;
      a.src = `/static/audio/${file}`;
      a.onended = playNextAudio;
      a.onerror = playNextAudio;
      a.play().catch(playNextAudio);
    }

    function drainMsgQueue() {
      while (!msgBlocked && msgQueue.length > 0) {
        const msg = msgQueue.shift();
        dispatchMsg(msg);
      }
    }

    function send(type, data = {}) {
      if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type, data }));
    }
    function setConn(ok) { document.getElementById('conn-dot').className = ok ? 'on' : ''; }

    // ── 消息处理 ──
    // 需要立即处理的消息类型（不进队列）：action/vote/speech 请求、action_clear
    const IMMEDIATE_TYPES = new Set(['action_clear', 'join_result', 'error', 'admin_result', 'your_info']);

    function handleMsg(msg) {
      if (IMMEDIATE_TYPES.has(msg.type)) {
        dispatchMsg(msg);
      } else if (msgBlocked) {
        msgQueue.push(msg);
      } else {
        dispatchMsg(msg);
      }
    }

    function dispatchMsg(msg) {
      switch (msg.type) {
        case 'game_state': gameState = msg.data; renderState(); break;
        case 'your_info': myInfo = msg.data; renderMyInfo(); break;
        case 'action_request': showActionPanel(msg.data); break;
        case 'vote_request': showVotePanel(msg.data); break;
        case 'witch_request': showWitchPanel(msg.data); break;
        case 'speech_turn': showSpeechPanel(msg.data); break;
        case 'action_clear': hideActionPanel(); break;
        case 'action_result': toast(msg.data.message, msg.data.success ? 3000 : 4500); break;
        case 'seer_results': updateSeerResults(msg.data.results); break;
        case 'notification': addNotif(msg.data.message); break;
        case 'play_audio':
          enqueueAudio(msg.data.files || msg.data.file);
          break;
        case 'join_result':
          if (msg.data.success) {
            toast('✅ ' + msg.data.message);
            document.getElementById('join-panel').style.display = 'none';
            document.getElementById('role-card').style.display = 'block';
            updateBadge();
          } else {
            toast('❌ ' + msg.data.message, 4500);
            // 加入失败则断开，让用户重新填写
            ws.close();
            mySeat = null; myNick = null;
          }
          break;
        case 'admin_result':
          toast('⚙️ ' + msg.data.message);
          loadEventLog();
          break;
        case 'error': toast('⚠️ ' + msg.data.message, 4500); break;
      }
    }

    // ── 加入（先填好信息再建立连接）──
    function joinGame() {
      const seat = parseInt(document.getElementById('seat-input').value);
      const nick = document.getElementById('nick-input').value.trim();
      if (!seat || !nick) { toast('请填写座位号和昵称'); return; }
      mySeat = seat; myNick = nick;
      ensureConnected();
    }

    function updateBadge() {
      if (mySeat && myNick)
        document.getElementById('player-badge').innerHTML = `<strong>${mySeat}号</strong> · ${myNick}`;
    }

    // ── 渲染状态 ──
    function renderState() {
      const { phase, phase_display, current_action, round, winner, players, current_speaker_seat, voting_candidates, preset_name, audio_device_seat } = gameState;

      // 同步自己的存活状态到 myInfo，以便角色卡显示（已出局）
      if (mySeat && myInfo.role) {
        const me = (players || []).find(p => p.seat === mySeat);
        if (me) {
          const wasAlive = myInfo.is_alive;
          myInfo.is_alive = me.is_alive;
          if (wasAlive !== me.is_alive) renderMyInfo();
        }
      }

      // 重置时清空角色卡
      if (phase === 'waiting' && myInfo.role) {
        myInfo = {};
        document.getElementById('role-card').style.display = 'none';
        document.getElementById('role-body').classList.remove('open');
        document.getElementById('role-arrow').textContent = '▼';
      }

      const ph = document.getElementById('phase-action');
      ph.textContent = current_action || phase_display || '等待开始';
      ph.className = '';
      if (phase === 'night') ph.classList.add('night');
      else if (phase === 'day_discuss') ph.classList.add('day');
      else if (phase === 'day_vote') ph.classList.add('vote');
      else if (phase === 'game_over') ph.classList.add('over');

      const presetLabel = preset_name ? ` · ${preset_name}` : '';
      document.getElementById('phase-label').textContent =
        round > 0 ? `第 ${round} 轮 · ${phase_display || ''}${presetLabel}` : `当前阶段${presetLabel}`;

      // 同步音频设备标签
      const audioLabel = document.getElementById('audio-device-label');
      if (audioLabel) audioLabel.textContent = audio_device_seat ? `${audio_device_seat} 号专用` : '广播模式';

      const grid = document.getElementById('player-grid');
      grid.innerHTML = '';
      (players || []).forEach(p => {
        const div = document.createElement('div');
        let cls = 'pc';
        if (!p.is_alive) cls += ' dead';
        if (current_speaker_seat === p.seat) cls += ' speaking';
        if ((voting_candidates || []).includes(p.seat)) cls += ' candidate';
        if (pendingTarget === p.seat) cls += ' sel';
        div.className = cls;
        div.dataset.seat = p.seat;
        const seerBadge = seerResults[p.seat];
        div.innerHTML =
          `<div class="sn">${p.seat}</div>` +
          `<div class="nk">${p.nickname || '?'}</div>` +
          (p.role_display ? `<div class="rl">${p.role_display}</div>` : '') +
          (p.is_sheriff ? '<div class="badge-sh">⭐</div>' : '') +
          (!p.is_alive ? '<div class="dead-x">✕</div>' : '') +
          (seerBadge ? `<div class="badge-seer ${seerBadge === '狼人' ? 'wolf' : 'good'}">${seerBadge}</div>` : '');
        div.addEventListener('click', () => {
          if (pendingMode) selectTarget(p.seat);
          else document.getElementById('admin-seat').value = p.seat;
        });
        grid.appendChild(div);
      });

      if (phase === 'waiting') seerResults = {};

      if (winner) {
        document.getElementById('over-text').textContent =
          winner === '狼人' ? '🐺 狼人阵营胜利！' : '🌟 好人阵营胜利！';
        document.getElementById('over-banner').classList.add('show');
      }
    }

    function renderMyInfo() {
      if (!myInfo.role) return;
      const r = myInfo.role;
      const alive = myInfo.is_alive !== false;
      document.getElementById('role-name-el').textContent = r.display_name + (alive ? '' : ' （已出局）');
      const teamEl = document.getElementById('role-team-el');
      teamEl.textContent = r.team === '狼人' ? '⚔️ 狼人阵营' : '🏡 好人阵营';
      teamEl.className = 'role-team ' + (r.team === '狼人' ? 'team-wolf' : 'team-good');
      document.getElementById('skills-el').innerHTML = (r.skills || [])
        .map(s => `<div class="skill-item"><b>${s.display_name}</b><span>${s.description}</span></div>`)
        .join('');
      // 确保角色卡始终显示且展开
      document.getElementById('role-card').style.display = 'block';
      const body = document.getElementById('role-body');
      if (!body.classList.contains('open')) {
        body.classList.add('open');
        document.getElementById('role-arrow').textContent = '▲';
      }
    }

    // ── 动作面板 ──
    function showActionPanel(data) {
      // 竞选警长报名：两个大按钮，点击即提交，无需二次确认
      if (data.skill === 'sheriff_nominate') {
        showNominatePanel(data);
        return;
      }

      pendingMode = 'action'; pendingTarget = null;
      document.getElementById('action-panel').style.display = 'block';
      document.getElementById('action-title').textContent = data.skill_display || '技能使用';
      document.getElementById('action-msg').textContent = data.message || '请选择目标';
      document.getElementById('confirm-btn').textContent = '✓ 确认';
      const c = document.getElementById('seat-buttons');
      c.innerHTML = '';
      c.style.gridTemplateColumns = '';
      if (data.requires_target) {
        if (data.options) {
          // 选项模式：options 字典提供标签覆盖，未覆盖的值显示座位号+昵称
          (data.valid_targets || []).forEach(val => {
            const b = document.createElement('button');
            b.className = 'seatbtn';
            const label = data.options[String(val)];
            if (label) {
              b.style.gridColumn = 'span 2';
              b.textContent = label;
            } else {
              const p = (gameState.players || []).find(p => p.seat === val);
              b.textContent = val;
              if (p) b.title = p.nickname || '';
            }
            b.dataset.seat = val;
            b.onclick = () => selectTarget(val);
            c.appendChild(b);
          });
        } else {
          (gameState.players || []).forEach(p => {
            const b = document.createElement('button');
            b.className = 'seatbtn';
            b.textContent = p.seat;
            b.dataset.seat = p.seat;
            b.disabled = !(data.valid_targets || []).includes(p.seat) || !p.is_alive;
            b.title = p.nickname || '';
            b.onclick = () => selectTarget(p.seat);
            c.appendChild(b);
          });
        }
      }
      document.getElementById('confirm-btn').style.display = data.requires_target ? 'flex' : 'none';
      document.getElementById('skip-btn').style.display = data.can_skip ? 'flex' : 'none';
      document.getElementById('speech-end-btn').style.display = 'none';
    }

    function showNominatePanel(data) {
      pendingMode = null;
      document.getElementById('action-panel').style.display = 'block';
      document.getElementById('action-title').textContent = '竞选警长';
      document.getElementById('action-msg').textContent = data.message || '请选择是否参与竞选';
      const c = document.getElementById('seat-buttons');
      c.innerHTML = '';
      c.style.gridTemplateColumns = '1fr 1fr';

      const btnJoin = document.createElement('button');
      btnJoin.className = 'btn btn-warn btn-full';
      btnJoin.style.padding = '18px';
      btnJoin.style.fontSize = '17px';
      btnJoin.textContent = '参与竞选';
      btnJoin.onclick = () => { send('action', { target: 1 }); hideActionPanel(); };

      const btnSkip = document.createElement('button');
      btnSkip.className = 'btn btn-gray btn-full';
      btnSkip.style.padding = '18px';
      btnSkip.style.fontSize = '17px';
      btnSkip.textContent = '跳过竞选';
      btnSkip.onclick = () => { send('action', { target: 0 }); hideActionPanel(); };

      c.appendChild(btnJoin);
      c.appendChild(btnSkip);

      document.getElementById('confirm-btn').style.display = 'none';
      document.getElementById('skip-btn').style.display = 'none';
      document.getElementById('speech-end-btn').style.display = 'none';
    }

    function showVotePanel(data) {
      pendingMode = 'vote'; pendingTarget = null;
      document.getElementById('action-panel').style.display = 'block';
      document.getElementById('action-title').textContent = '投票';
      document.getElementById('action-msg').textContent = (data.message || '请选择淘汰玩家') + '（点击上方玩家格子选择，或弃票）';
      const c = document.getElementById('seat-buttons');
      c.innerHTML = '';
      c.style.gridTemplateColumns = '';
      const ab = document.createElement('button');
      ab.className = 'seatbtn'; ab.textContent = '弃票'; ab.title = '弃票';
      ab.style.gridColumn = 'span 5';
      ab.onclick = () => selectTarget(0);
      c.appendChild(ab);
      document.getElementById('confirm-btn').style.display = 'flex';
      document.getElementById('confirm-btn').textContent = '✓ 确认';
      document.getElementById('skip-btn').style.display = 'none';
      document.getElementById('speech-end-btn').style.display = 'none';
    }

    function showSpeechPanel(data) {
      pendingMode = 'speech';
      document.getElementById('action-panel').style.display = 'block';
      document.getElementById('action-title').textContent = '🎤 你的发言';
      document.getElementById('action-msg').textContent = data.message || '请发言';
      document.getElementById('seat-buttons').innerHTML = '';
      document.getElementById('confirm-btn').style.display = 'none';
      document.getElementById('skip-btn').style.display = 'none';
      document.getElementById('speech-end-btn').style.display = 'flex';
    }

    function hideActionPanel() {
      pendingMode = null; pendingTarget = null;
      witchPendingData = null;
      document.getElementById('action-panel').style.display = 'none';
      renderState();
    }

    function updateSeerResults(results) {
      results.forEach(r => { seerResults[r.seat] = r.camp; });
      renderState();
    }

    // ── 女巫面板 ──
    let witchSaveChoice = undefined;  // seat or null
    let witchPoisonChoice = undefined; // seat or null

    function showWitchPanel(data) {
      witchPendingData = data;
      witchSaveChoice = undefined;
      witchPoisonChoice = undefined;
      pendingMode = 'witch'; pendingTarget = null;

      document.getElementById('action-panel').style.display = 'block';
      document.getElementById('action-title').textContent = '女巫';

      const killTarget = data.kill_target;
      let html = '';

      if (data.can_save && killTarget != null) {
        const kp = (gameState.players || []).find(p => p.seat === killTarget);
        const kname = kp ? kp.nickname : '?';
        html += `<div style="margin-bottom:8px;color:var(--accent2)">今晚 ${killTarget}号(${kname}) 被猎杀</div>`;
        html += `<div class="witch-btn-row">`;
        html += `<button class="witch-choice" id="btn-save" onclick="witchToggleSave(${killTarget})">💊 使用解药救 ${killTarget}号</button>`;
        html += `<button class="witch-choice" id="btn-no-save" onclick="witchToggleSave(null)">跳过解药</button>`;
        html += `</div>`;
      } else if (!data.can_save) {
        html += `<div style="margin-bottom:8px;color:var(--gray)">解药已用完</div>`;
      } else {
        html += `<div style="margin-bottom:8px;color:var(--gray)">今晚无人被杀</div>`;
      }

      if (data.can_poison) {
        html += `<div style="margin-bottom:6px;font-size:13px;color:var(--text-dim)">毒药目标（可选）：</div>`;
        html += `<div id="poison-btns" style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px">`;
        html += `<button class="seatbtn" id="pb-0" onclick="witchTogglePoison(0)">跳过</button>`;
        (data.poison_targets || []).forEach(s => {
          const pp = (gameState.players || []).find(p => p.seat === s);
          html += `<button class="seatbtn" id="pb-${s}" onclick="witchTogglePoison(${s})" title="${pp ? pp.nickname : ''}">${s}</button>`;
        });
        html += `</div>`;
      } else {
        html += `<div style="margin-bottom:8px;color:var(--gray)">毒药已用完</div>`;
      }

      document.getElementById('action-msg').innerHTML = html;
      document.getElementById('seat-buttons').innerHTML = '';
      document.getElementById('confirm-btn').style.display = 'flex';
      document.getElementById('confirm-btn').textContent = '✓ 确认女巫操作';
      document.getElementById('skip-btn').style.display = 'none';
      document.getElementById('speech-end-btn').style.display = 'none';
    }

    function witchToggleSave(seat) {
      witchSaveChoice = (witchSaveChoice === seat) ? undefined : seat;
      ['btn-save', 'btn-no-save'].forEach(id => {
        const b = document.getElementById(id);
        if (b) b.classList.remove('sel-save');
      });
      if (witchSaveChoice !== undefined) {
        const id = seat != null ? 'btn-save' : 'btn-no-save';
        const b = document.getElementById(id);
        if (b) b.classList.add('sel-save');
        // 选了解药则清空毒药
        if (seat != null) { witchPoisonChoice = undefined; witchRefreshPoison(); }
      }
    }

    function witchRefreshPoison() {
      document.querySelectorAll('[id^="pb-"]').forEach(b => b.classList.remove('sel', 'sel-poison'));
      if (witchPoisonChoice !== undefined) {
        const b = document.getElementById(`pb-${witchPoisonChoice}`);
        if (b) b.classList.add('sel-poison');
      }
    }

    function witchTogglePoison(seat) {
      witchPoisonChoice = (witchPoisonChoice === seat) ? undefined : seat;
      witchRefreshPoison();
      // 选了毒药（非跳过）则清空解药
      if (witchPoisonChoice !== undefined && witchPoisonChoice !== 0) {
        witchSaveChoice = undefined;
        ['btn-save', 'btn-no-save'].forEach(id => {
          const b = document.getElementById(id);
          if (b) b.classList.remove('sel-save');
        });
      }
    }

    function confirmWitch() {
      const save = (witchSaveChoice !== undefined && witchSaveChoice !== null && witchSaveChoice !== 0)
        ? witchSaveChoice : null;
      const poison = (witchPoisonChoice !== undefined && witchPoisonChoice !== null && witchPoisonChoice !== 0)
        ? witchPoisonChoice : null;
      send('witch_action', { save, poison });
      hideActionPanel();
    }

    function selectTarget(seat) {
      // 投票模式：只允许选弃票(0)或候选人
      if (pendingMode === 'vote' && seat !== 0 && !(gameState.voting_candidates || []).includes(seat)) return;
      pendingTarget = (pendingTarget === seat) ? null : seat;
      document.querySelectorAll('.seatbtn').forEach(b => b.classList.toggle('sel', parseInt(b.dataset.seat) === pendingTarget));
      // 只有 seat 对应真实玩家时才高亮玩家网格
      const isRealSeat = seat > 0 && (gameState.players || []).some(p => p.seat === seat);
      document.querySelectorAll('.pc').forEach(c => c.classList.toggle('sel', isRealSeat && parseInt(c.dataset.seat) === pendingTarget));
    }

    function confirmAction() {
      if (pendingMode === 'witch') { confirmWitch(); return; }
      if (pendingMode === 'action') send('action', { target: pendingTarget });
      else if (pendingMode === 'vote') send('vote', { target: pendingTarget ?? 0 });
      hideActionPanel();
    }
    function skipAction() { send('action', { target: null }); hideActionPanel(); }
    function sendSpeechEnd() { send('speech_end', {}); hideActionPanel(); }

    // ── 通知 ──
    function addNotif(msg) {
      const list = document.getElementById('notif-list');
      const el = document.createElement('div');
      el.className = 'notif-item'; el.textContent = msg;
      list.appendChild(el);
      list.scrollTop = list.scrollHeight;
      while (list.children.length > 40) list.removeChild(list.firstChild);
    }

    // ── Toast ──
    let _tt = null;
    function toast(msg, ms = 2500) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.style.display = 'block';
      clearTimeout(_tt); _tt = setTimeout(() => el.style.display = 'none', ms);
    }

    // ── 折叠 ──
    function toggleCard(bid, aid) {
      const b = document.getElementById(bid), a = document.getElementById(aid);
      b.classList.toggle('open');
      a.textContent = b.classList.contains('open') ? '▲' : '▼';
      if (bid === 'admin-body' && b.classList.contains('open')) { loadPresets(); loadEventLog(); }
    }

    // ── 管理员 ──
    function adminSend(cmd, extra = {}) { send('admin', { command: cmd, ...extra }); }
    function adminStartPreset() { const p = document.getElementById('preset-sel').value; if (!p) { toast('请选择预设'); return; } adminSend('start_game', { preset: p }); }
    function adminStartCustom() { const v = document.getElementById('custom-roles').value.trim(); if (!v) { toast('请输入角色列表'); return; } adminSend('start_game', { roles: v.split(',').map(r => r.trim()).filter(Boolean) }); }
    function adminSkip() { adminSend('skip_phase'); }
    function adminGotoNight() { adminSend('goto_night'); }
    function adminReset() { if (confirm('确认重置游戏？')) adminSend('reset_game'); }
    function adminKill() { const s = +document.getElementById('admin-seat').value; if (s) adminSend('force_kill', { seat: s }); }
    function adminRevive() { const s = +document.getElementById('admin-seat').value; if (s) adminSend('force_revive', { seat: s }); }
    function adminSheriff() { const s = +document.getElementById('admin-seat').value; if (s) adminSend('set_sheriff', { seat: s }); }
    function adminAudio() {
      const v = document.getElementById('audio-seat').value;
      const s = v === '' ? null : (parseInt(v) || null);
      adminSend('set_audio_device', { seat: s });
      document.getElementById('audio-device-label').textContent = s ? `${s} 号专用` : '广播模式';
    }
    function adminRollback(id) { if (!confirm(`回退到事件 #${id}？`)) return; adminSend('rollback', { event_id: id }); }

    async function loadPresets() {
      try {
        const data = await fetch('/api/presets').then(r => r.json());
        const sel = document.getElementById('preset-sel');
        sel.innerHTML = '<option value="">选择预设...</option>';
        (data.presets || []).forEach((p, i) => {
          const o = document.createElement('option');
          o.value = p.name;
          o.textContent = `${p.name}`;
          o.selected = i === 0;
          sel.appendChild(o);
        });
      } catch (e) { }
    }

    async function loadEventLog() {
      try {
        const data = await fetch('/api/events').then(r => r.json());
        const evs = (data.events || []).slice(-50).reverse();
        const el = document.getElementById('event-log-list');
        if (!evs.length) { el.textContent = '暂无事件'; return; }
        el.innerHTML = evs.map(e =>
          `<div class="eline" onclick="adminRollback(${e.id - 1})"><span class="eid">#${e.id}</span>[${e.timestamp}] ${e.description}</div>`
        ).join('');
      } catch (e) { }
    }

    // 管理员面板：如未加入也可直接连接（不发 join 消息）
    function ensureConnected() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
      ws = new WebSocket(WS_URL);
      ws.onopen = () => {
        setConn(true);
        if (mySeat) ws.send(JSON.stringify({ type: 'join', data: { seat: mySeat, nickname: myNick } }));
      };
      ws.onclose = () => {
        setConn(false);
        if (mySeat) setTimeout(ensureConnected, 3000);
      };
      ws.onerror = () => ws.close();
      ws.onmessage = e => handleMsg(JSON.parse(e.data));
    }

    document.getElementById('admin-header').addEventListener('click', () => {
      ensureConnected();
    });

    // 页面加载即拉取预设列表
    loadPresets();
  </script>
</body>

</html>
