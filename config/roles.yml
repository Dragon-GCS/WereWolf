      - villager

  - name: "标准10人局"
    description: "3狼 + 预言家 + 女巫 + 猎人 + 守卫 + 3村民"
    roles:
      - werewolf
      - werewolf
      - werewolf
      - seer
      - witch
      - hunter
      - guard
