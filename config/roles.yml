# 角色定义 —— 每个角色的阵营、描述及夜晚行动配置

roles:
  - name: 狼人
    display_name: 狼人
    team: 狼人
    description: 夜晚与狼队共同猎杀一名好人
    phase: night
    open_msg: 狼人请睁眼
    open_audio:
      - 狼人.mp3
      - 请睁眼.mp3
    action_audio:
      - 请执行操作.mp3
    close_msg: 狼人请闭眼
    close_audio:
      - 狼人.mp3
      - 请闭眼.mp3

  - name: 村民
    display_name: 村民
    team: 村民
    description: 没有特殊技能，通过推理找出狼人

  - name: 预言家
    display_name: 预言家
    team: 神职
    description: 每晚可查验一名玩家的阵营
    phase: night
    open_msg: 预言家请睁眼
    open_audio:
      - 预言家.mp3
      - 请睁眼.mp3
    action_audio:
      - 请执行操作.mp3
    close_msg: 预言家请闭眼
    close_audio:
      - 预言家.mp3
      - 请闭眼.mp3

  - name: 女巫
    display_name: 女巫
    team: 神职
    description: 持有解药和毒药各一瓶，可在夜晚使用
    phase: night
    open_msg: 女巫请睁眼
    open_audio:
      - 女巫.mp3
      - 请睁眼.mp3
    action_audio:
      - 请执行操作.mp3
    close_msg: 女巫请闭眼
    close_audio:
      - 女巫.mp3
      - 请闭眼.mp3

  - name: 猎人
    display_name: 猎人
    team: 神职
    description: 被淘汰时可以开枪带走一名玩家
    phase: on_death

  - name: 守卫
    display_name: 守卫
    team: 神职
    description: 每晚守护一名玩家，不能连续守护同一人
    phase: night
    open_msg: 守卫请睁眼
    open_audio:
      - 守卫.mp3
      - 请睁眼.mp3
    action_audio:
      - 请执行操作.mp3
    close_msg: 守卫请闭眼
    close_audio:
      - 守卫.mp3
      - 请闭眼.mp3

  - name: 白痴
    display_name: 白痴
    team: 神职
    description: 被投票出局时翻牌，保留座位但失去投票权
    phase: on_vote_out

  - name: 魔镜少女
    display_name: 魔镜少女
    team: 神职
    description: 每晚可查验一名玩家的具体身份（加强版预言家，显示职业名）
    phase: night
    open_msg: 魔镜少女请睁眼
    open_audio:
      - 魔镜少女.mp3
      - 请睁眼.mp3
    action_audio:
      - 请执行操作.mp3
    close_msg: 魔镜少女请闭眼
    close_audio:
      - 魔镜少女.mp3
      - 请闭眼.mp3

  - name: 机械狼
    display_name: 机械狼
    team: 狼人
    description: 第一晚学习指定玩家技能（女巫→毒药，狼人→破盾刀，其他→完整技能）；被查验时显示为目标身份；其他狼全部死亡后才能刀人
    phase: night
    open_msg: 机械狼请睁眼
    open_audio:
      - 机械狼.mp3
      - 请睁眼.mp3
    action_audio:
      - 请执行操作.mp3
    close_msg: 机械狼请闭眼
    close_audio:
      - 机械狼.mp3
      - 请闭眼.mp3

  - name: 黑狼王
    display_name: 黑狼王
    team: 狼人
    description: 狼人版猎人，死亡时可以开枪带走一名玩家
    phase: on_death

  - name: 吸血鬼
    display_name: 吸血鬼
    team: 狼人
    description: 第一晚可指定一名玩家将其阵营转变为狼人（身份和技能不变）；第二晚起被查验时显示为狼人；魔镜少女可获取原始身份和转化信息
    phase: night
    open_msg: 吸血鬼请睁眼
    open_audio:
      - 吸血鬼.mp3
      - 请睁眼.mp3
    action_audio:
      - 请执行操作.mp3
    close_msg: 吸血鬼请闭眼
    close_audio:
      - 吸血鬼.mp3
      - 请闭眼.mp3

  - name: 守墓人
    display_name: 守墓人
    team: 神职
    description: 神职，被动获得白天出局玩家的身份

  - name: 石像鬼
    display_name: 石像鬼
    team: 狼人
    description: 每晚可查验一名玩家的具体身份（狼人版魔镜少女）；其他狼人全部出局后才能刀人
    phase: night
    open_msg: 石像鬼请睁眼
    open_audio:
      - 石像鬼.mp3
      - 请睁眼.mp3
    action_audio:
      - 请执行操作.mp3
    close_msg: 石像鬼请闭眼
    close_audio:
      - 石像鬼.mp3
      - 请闭眼.mp3

  - name: 骑士
    display_name: 骑士
    team: 神职
    description: 白天发言期间可亮明身份发起决斗；决斗狼人→狼人立即死亡进入黑夜；决斗好人→骑士自己死亡；每局只能决斗一次

  - name: 熊
    display_name: 熊
    team: 神职
    description: 被动技能，每天天亮时检测左右两侧存活邻居，若含有狼人阵营则全局广播咆哮

  - name: 炸弹人
    display_name: 炸弹人
    team: 神职
    description: 被投票出局时，可选择引爆炸弹带走所有投票给自己的玩家（被带走者不触发死亡技能）
    phase: on_vote_out
